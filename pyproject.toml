[tool.ruff]
target-version = "py312"
line-length = 88
src = ["app", "scripts"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "ARG",
]

[tool.ruff.lint.per-file-ignores]
"scripts/export_openapi.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true
