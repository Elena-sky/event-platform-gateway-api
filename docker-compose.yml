# Runs only gateway-api on the external Docker network shared with ``event-platform-infra``.
#
# Prerequisites: broker already up (``cd event-platform-infra && docker compose up -d``).
#
# Requires ``.env`` (copy from ``.env.example``). Compose sets ``RABBITMQ_HOST=rabbitmq``,
# ``UVICORN_HOST=0.0.0.0``, and publishes ``APP_PORT`` from your ``.env``.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-platform-gateway-api
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
      UVICORN_HOST: 0.0.0.0
    ports:
      - "${APP_PORT}:${APP_PORT}"
    restart: unless-stopped
    networks:
      - event-platform

networks:
  event-platform:
    external: true
    name: ${EVENT_PLATFORM_NETWORK_NAME}
